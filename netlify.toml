[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

# --- Force apex domain (nhb-consultancy.com), strip www ---
[[redirects]]
  from = "https://www.nhb-consultancy.com/*"
  to = "https://nhb-consultancy.com/:splat"
  status = 301
  force = true

# --- SPA fallback (must remain last among redirects) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- Global security + SEO headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# --- Sitemap & robots: ensure correct content-type, no cache issues ---
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# --- Long cache for static assets ---
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
